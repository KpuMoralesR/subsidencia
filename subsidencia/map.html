<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa - GeoVisualizador Subsidencia CDMX</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { unamBlue: '#003B5C', unamGold: '#F1C400' } }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Leaflet & Draw -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Draggable Multi-Modal System */
        .draggable-modal {
            position: absolute;
            width: 500px;
            background: #003B5C;
            border: 2px solid #F1C400;
            pointer-events: auto;
            z-index: 3001;
            clip-path: polygon(5% 0, 100% 0, 100% 90%, 95% 100%, 0 100%, 0 10%);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            cursor: move;
            border-bottom: 1px solid rgba(241, 196, 0, 0.2);
            padding: 0.75rem 1rem;
        }

        /* Archive System on the Right */
        #archiveZone {
            position: absolute;
            right: 0;
            top: 15%;
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: flex-end;
            z-index: 2500;
            pointer-events: none;
            padding: 1rem;
        }

        .archive-tag {
            pointer-events: auto;
            background: #003B5C;
            color: #F1C400;
            padding: 0.6rem 1rem;
            border-right: 4px solid #F1C400;
            font-weight: 800;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: -4px 0 12px rgba(241, 196, 0, 0.4);
            transform: translateX(10px);
            transition: all 0.3s;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .archive-tag:hover {
            transform: translateX(0);
            background: #004b7a;
        }

        /* Radial Wheel (3-state Toggle) */
        .wheel-container {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            width: 600px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            transition: bottom 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .wheel-container:hover {
            bottom: 0;
        }

        .svg-wheel {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .segment {
            cursor: pointer;
            transition: 0.3s;
            stroke-width: 2;
            pointer-events: auto;
        }

        .segment.active {
            stroke-width: 4 !important;
            filter: drop-shadow(0 0 10px currentColor);
        }

        .segment-icon {
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            text-anchor: middle;
            pointer-events: none;
        }

        /* General HUD */
        .legend-gaming {
            position: absolute;
            bottom: 1.5rem;
            left: 1.5rem;
            z-index: 1001;
            background: rgba(0, 59, 92, 0.95);
            border-left: 4px solid #F1C400;
            padding: 1rem;
            color: #fff;
        }

        /* Navbar HUD */
        .navbar-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 59, 92, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #F1C400;
            z-index: 4000;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            color: white;
            clip-path: polygon(0 0, 100% 0, 100% 80%, 98% 100%, 2% 100%, 0 80%);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1.5px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links a:hover {
            color: #F1C400;
            text-shadow: 0 0 10px rgba(241, 196, 0, 0.5);
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 9px;
            font-weight: 700;
            color: #10b981;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>

    <nav class="navbar-hud">
        <div class="nav-container">
            <div class="nav-left">
                <div class="nav-logo">
                    <i class="fa-solid fa-hill-avalanche text-unamGold text-xl"></i>
                    <span class="logo-text">UNAM <span class="text-unamGold font-light">SUBSIDENCIA</span></span>
                </div>
            </div>
            <div class="nav-center">
                <ul class="nav-links">
                    <li><a href="index.html"><i class="fas fa-house"></i> INICIO</a></li>
                    <li><a href="#" class="text-unamGold"><i class="fas fa-map-location-dot"></i> MAPA</a></li>
                    <li><a href="#" onclick="handleAction('streets')"><i class="fas fa-layer-group"></i> CAPAS</a></li>
                    <li><a href="#" onclick="handleAction('temporal')"><i class="fas fa-chart-line"></i> ANÁLISIS</a></li>
                </ul>
            </div>
            <div class="nav-right hidden md:flex items-center gap-6">
                <button onclick="openLoginModal()"
                    class="flex items-center gap-2 px-4 py-1.5 bg-unamGold text-unamBlue font-black text-[10px] tracking-widest rounded skew-x-[-15deg] hover:bg-white transition-all">
                    <span class="skew-x-[15deg]"><i class="fas fa-user-lock"></i> LOGIN</span>
                </button>
                <div class="system-status">
                    <span class="status-dot"></span>
                </div>
            </div>
        </div>
    </nav>

    <div id="map"></div>
    <div id="archiveZone"></div>

    <div class="legend-gaming">
        <h3 class="text-unamGold font-black text-xs tracking-widest mb-1 italic">Analizador de subsidencia</h3>
        <p class="text-[8px] opacity-60 uppercase mb-3 border-b border-unamGold/20 pb-1">Subsidencia CDMX</p>
        <div class="space-y-1">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-red-600"></div><span class="text-[8px] font-bold text-white/50">> 30 CM/AÑO</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-orange-500"></div><span class="text-[8px] font-bold text-white/50">15-30 CM/AÑO</span>
            </div>
        </div>
    </div>

    <div class="wheel-container"><svg class="svg-wheel" viewBox="0 0 600 350" id="wheel-svg"></svg></div>

    <!-- Accessibility Button (Shared) -->
    <button id="accessibilityBtn"
        class="fixed bottom-6 right-6 z-[3000] w-12 h-12 bg-unamBlue border-2 border-unamGold text-unamGold rounded-full shadow-lg hover:bg-unamBlue/80 transition-all flex items-center justify-center text-xl"
        title="Accesibilidad">
        <i class="fas fa-universal-access"></i>
    </button>
    <input type="file" id="geoJSONUpload" class="hidden" accept=".json,.geojson">

    <!-- Modal Template -->
    <template id="modalTemplate">
        <div class="draggable-modal shadow-2xl">
            <div class="modal-header flex justify-between items-center">
                <h2 class="text-unamGold font-black text-[10px] tracking-widest flex items-center gap-2">
                    <i class="fa fa-bars"></i> <span class="modal-title-text">ANÁLISIS</span>
                </h2>
                <div class="flex items-center gap-3">
                    <button class="minimize-btn text-unamGold/40 hover:text-unamGold"><i class="fas fa-minus"></i></button>
                    <button class="archive-btn text-unamGold/40 hover:text-unamGold"><i class="fas fa-box-archive"></i></button>
                    <button class="close-btn text-unamGold/40 hover:text-unamGold"><i class="fas fa-times text-lg"></i></button>
                </div>
            </div>
            <div class="modal-body p-4 bg-gray-950/40">
                <div class="h-[250px] w-full"><canvas class="modal-canvas"></canvas></div>
            </div>
        </div>
    </template>

    <!-- Login Modal Template -->
    <template id="loginModalTemplate">
        <div class="draggable-modal shadow-2xl !w-[350px]">
            <div class="modal-header flex justify-between items-center !cursor-default">
                <h2 class="text-unamGold font-black text-[10px] tracking-widest flex items-center gap-2">
                    <i class="fa fa-user-shield"></i> ACCESO AL SISTEMA
                </h2>
                <button class="close-btn text-unamGold/40 hover:text-unamGold"><i class="fas fa-times text-lg"></i></button>
            </div>
            <div class="modal-body p-6 bg-gray-950/40">
                <div class="space-y-4">
                    <div>
                        <label class="block text-unamGold text-[8px] font-black tracking-widest uppercase mb-1">Usuario</label>
                        <input type="text" class="w-full bg-unamBlue/30 border border-unamGold/30 text-white p-2 text-xs focus:outline-none focus:border-unamGold" placeholder="ID_OPERADOR_UNAM">
                    </div>
                    <div>
                        <label class="block text-unamGold text-[8px] font-black tracking-widest uppercase mb-1">Contraseña</label>
                        <input type="password" class="w-full bg-unamBlue/30 border border-unamGold/30 text-white p-2 text-xs focus:outline-none focus:border-unamGold" placeholder="••••••••">
                    </div>
                    <button class="w-full bg-unamGold text-unamBlue font-black py-2 text-[10px] tracking-widest hover:bg-white transition-colors">INICIAR SECUENCIA DE ACCESO</button>
                </div>
            </div>
        </div>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        let modalCount = 0;
        const activeModals = new Map();

        window.openModal = (type, dataOverride = null) => {
            modalCount++;
            const id = `modal-${modalCount}`;
            const template = document.getElementById('modalTemplate');
            const clone = template.content.cloneNode(true);
            const modal = clone.querySelector('.draggable-modal');
            modal.id = id;
            modal.style.top = (100 + (modalCount % 5) * 30) + "px";
            modal.style.left = (150 + (modalCount % 5) * 30) + "px";

            const titleText = type === 'temporal' ? `HISTORIAL TEMPORAL #${modalCount}` : `PERFIL ESPACIAL #${modalCount}`;
            modal.querySelector('.modal-title-text').textContent = titleText;

            modal.querySelector('.minimize-btn').onclick = () => {
                const b = modal.querySelector('.modal-body');
                b.style.display = b.style.display === "none" ? "block" : "none";
            };
            modal.querySelector('.archive-btn').onclick = () => archiveModal(id, titleText);
            modal.querySelector('.close-btn').onclick = () => { modal.remove(); activeModals.delete(id); };

            document.body.appendChild(modal);
            dragElement(modal);

            const ctx = modal.querySelector('.modal-canvas').getContext('2d');
            const labels = type === 'temporal' ? ['2018', '2019', '2020', '2021', '2022', '2023'] : (dataOverride?.labels || window.lastProfileData?.labels || ['READY']);
            const data = type === 'temporal' ? [15, 21, 28, 35, 42, 50] : (dataOverride?.data || window.lastProfileData?.data || [0]);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Análisis (cm)',
                        data, borderColor: '#F1C400', backgroundColor: 'rgba(241, 196, 0, 0.1)', fill: true, tension: 0.4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#F1C400', font: { size: 9 } } } },
                    scales: {
                        x: { ticks: { color: '#94a3b8', font: { size: 8 } }, grid: { display: false } },
                        y: { ticks: { color: '#94a3b8', font: { size: 8 } }, grid: { color: 'rgba(241,196,0,0.05)' } }
                    }
                }
            });

            activeModals.set(id, { modal, labels, data });
        };

        window.openLoginModal = () => {
            const template = document.getElementById('loginModalTemplate');
            const clone = template.content.cloneNode(true);
            const modal = clone.querySelector('.draggable-modal');
            modal.style.top = "200px";
            modal.style.left = "calc(50% - 175px)";
            modal.querySelector('.close-btn').onclick = () => modal.remove();
            document.body.appendChild(modal);
        };

        function archiveModal(id, title) {
            const instance = activeModals.get(id);
            if (!instance) return;
            instance.modal.style.display = "none";
            const tag = document.createElement("div");
            tag.className = "archive-tag";
            tag.innerHTML = `<i class="fa fa-chart-area mr-2"></i> ${title}`;
            tag.onclick = () => { tag.remove(); instance.modal.style.display = "flex"; };
            document.getElementById("archiveZone").appendChild(tag);
        }

        function dragElement(elmnt) {
            var p1 = 0, p2 = 0, p3 = 0, p4 = 0;
            const header = elmnt.querySelector('.modal-header');
            header.onmousedown = (e) => {
                e.preventDefault(); p3 = e.clientX; p4 = e.clientY;
                document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
                document.onmousemove = (ev) => {
                    ev.preventDefault(); p1 = p3 - ev.clientX; p2 = p4 - ev.clientY;
                    p3 = ev.clientX; p4 = ev.clientY;
                    elmnt.style.top = (elmnt.offsetTop - p2) + "px";
                    elmnt.style.left = (elmnt.offsetLeft - p1) + "px";
                };
            };
        }

        let menuState = 0; let activeCatIndex = null;
        const categories = [
            { name: "DIBUJO", icon: "\uf303", color: "#F1C400", sub: [{ n: "Línea", i: "\uf25c", a: "polyline" }, { n: "Poli", i: "\uf5ee", a: "polygon" }, { n: "Circ", i: "\uf111", a: "circle" }] },
            { name: "CAPAS", icon: "\uf5fd", color: "#0ea5e9", sub: [{ n: "Sat", i: "\uf7bf", a: "sat" }, { n: "Calles", i: "\uf279", a: "streets" }] },
            { name: "STATS", icon: "\uf201", color: "#f97316", sub: [{ n: "Temp", i: "\uf017", a: "temporal" }, { n: "Prof", i: "\uf542", a: "perfil" }] },
            { name: "UNAM", icon: "\uf19c", color: "#10b981", sub: [{ n: "Up", i: "\uf093", a: "upload" }, { n: "Reset", i: "\uf021", a: "reset" }] }
        ];

        const polarToCartesian = (x, y, r, deg) => {
            const rad = (deg - 90) * Math.PI / 180.0;
            return { x: x + (r * Math.cos(rad)), y: y + (r * Math.sin(rad)) };
        };
        const createPath = (x, y, ri, ro, s, e) => {
            const sI = polarToCartesian(x, y, ri, e), eI = polarToCartesian(x, y, ri, s);
            const sO = polarToCartesian(x, y, ro, e), eO = polarToCartesian(x, y, ro, s);
            return ["M", sI.x, sI.y, "L", sO.x, sO.y, "A", ro, ro, 0, 0, 0, eO.x, eO.y, "L", eI.x, eI.y, "A", ri, ri, 0, 0, 1, sI.x, sI.y, "Z"].join(" ");
        };

        const render = () => {
            const svg = document.getElementById('wheel-svg'); svg.innerHTML = '';
            const angles = [270, 315, 360, 405, 450];
            if (menuState >= 1) {
                categories.forEach((cat, i) => {
                    const active = activeCatIndex === i;
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", createPath(300, 300, 70, 160, angles[i], angles[i + 1]));
                    path.classList.add("segment"); if (active) path.classList.add("active");
                    path.setAttribute("fill", active ? "rgba(0,59,92,1)" : "rgba(0,59,92,0.85)");
                    path.setAttribute("stroke", active ? cat.color : "rgba(241,196,0,0.1)");
                    path.setAttribute("color", cat.color);
                    path.onclick = (e) => { e.stopPropagation(); activeCatIndex = i; menuState = 2; render(); };
                    svg.appendChild(path);
                    const mid = angles[i] + 22.5; const pos = polarToCartesian(300, 300, 115, mid);
                    const ic = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    ic.setAttribute("x", pos.x); ic.setAttribute("y", pos.y + 9); ic.classList.add("segment-icon");
                    ic.setAttribute("fill", cat.color); ic.style.fontSize = "24px"; ic.textContent = cat.icon;
                    svg.appendChild(ic);
                });
            }
            if (menuState === 2 && activeCatIndex !== null) {
                const cat = categories[activeCatIndex]; const subW = 180 / cat.sub.length;
                cat.sub.forEach((sub, j) => {
                    const s = 270 + (j * subW), e = s + subW;
                    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    p.setAttribute("d", createPath(300, 300, 160, 240, s, e)); p.classList.add("segment");
                    p.setAttribute("fill", "rgba(0,59,92,0.9)"); p.setAttribute("stroke", cat.color);
                    p.setAttribute("color", cat.color); p.onclick = (ev) => { ev.stopPropagation(); handleAction(sub.a); };
                    svg.appendChild(p);
                    const mid = s + subW / 2; const pos = polarToCartesian(300, 300, 200, mid);
                    const st = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    st.setAttribute("x", pos.x); st.setAttribute("y", pos.y + 7); st.classList.add("segment-icon");
                    st.style.fontSize = "16px"; st.setAttribute("fill", cat.color); st.textContent = sub.i;
                    svg.appendChild(st);
                });
            }
            const core = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            core.setAttribute("cx", 300); core.setAttribute("cy", 300); core.setAttribute("r", 70);
            core.setAttribute("fill", "#003B5C"); core.setAttribute("stroke", "#F1C400"); core.setAttribute("stroke-width", "2");
            core.style.cursor = "pointer"; core.onclick = () => { if (menuState === 0) menuState = 1; else { menuState = 0; activeCatIndex = null; } render(); };
            svg.appendChild(core);
            const cIcon = document.createElementNS("http://www.w3.org/2000/svg", "text");
            cIcon.setAttribute("x", 300); cIcon.setAttribute("y", 312); cIcon.classList.add("segment-icon");
            cIcon.style.fontSize = "32px"; cIcon.setAttribute("fill", "#F1C400");
            cIcon.textContent = menuState === 0 ? "\uf0c9" : "\uf00d"; cIcon.style.cursor = "pointer";
            cIcon.onclick = () => { if (menuState === 0) menuState = 1; else { menuState = 0; activeCatIndex = null; } render(); };
            svg.appendChild(cIcon);
        };
        render();
    </script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
